<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>多条件查询 - 图书管理系统</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        color: #2d3436;
        padding: 40px 20px;
      }

      .czh-container {
        max-width: 1000px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        animation: fadeIn 0.6s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .czh-header-section {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 2px solid #f3f4f6;
      }

      .czh-title {
        font-size: 28px;
        font-weight: 700;
        background: linear-gradient(135deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .czh-user-info {
        font-size: 14px;
        color: #636e72;
        font-weight: 500;
      }

      .czh-search-form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 30px;
      }

      .czh-form-group {
        display: flex;
        flex-direction: column;
      }

      .czh-form-group label {
        margin-bottom: 8px;
        color: #374151;
        font-weight: 600;
        font-size: 14px;
      }

      .czh-form-group input {
        padding: 12px 16px;
        border: 2px solid #e5e7eb;
        border-radius: 12px;
        font-size: 15px;
        transition: all 0.3s ease;
        background: #f9fafb;
        color: #1f2937;
      }

      .czh-form-group input:focus {
        outline: none;
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
      }

      .czh-btn {
        padding: 12px 30px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        grid-column: span 2;
        justify-self: center;
      }

      .czh-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
      }

      .czh-table-container {
        background: white;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      .czh-results-table {
        width: 100%;
        border-collapse: collapse;
      }

      .czh-results-table th {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        padding: 16px;
        text-align: left;
        font-weight: 600;
        font-size: 14px;
      }

      .czh-results-table th:first-child {
        border-radius: 16px 0 0 0;
      }

      .czh-results-table th:last-child {
        border-radius: 0 16px 0 0;
      }

      .czh-results-table td {
        padding: 16px;
        border-bottom: 1px solid #f3f4f6;
        color: #374151;
        font-size: 14px;
      }

      .czh-results-table tr:hover {
        background: #f8fafc;
      }

      .czh-results-table tr:last-child td {
        border-bottom: none;
      }

      .czh-no-results {
        text-align: center;
        padding: 60px 20px;
        color: #636e72;
        font-size: 16px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      .czh-no-results h3 {
        margin-bottom: 10px;
        color: #374151;
        font-size: 20px;
      }

      .czh-btn-back {
        background: linear-gradient(135deg, #94a3b8, #64748b);
        margin-top: 20px;
        display: inline-block;
        text-decoration: none;
      }

      .czh-btn-back:hover {
        box-shadow: 0 8px 20px rgba(148, 163, 184, 0.3);
      }

      @media (max-width: 768px) {
        .czh-search-form {
          grid-template-columns: 1fr;
          gap: 15px;
        }
        .czh-btn {
          grid-column: span 1;
        }
        .czh-header-section {
          flex-direction: column;
          gap: 15px;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="czh-container">
      <div class="czh-header-section">
        <h1 class="czh-title">多条件查询</h1>
        <span
          class="czh-user-info"
          th:text="'当前用户：' + ${czhUser.czhUserName}"
        ></span>
      </div>

      <form
        th:action="@{/book/search-multi}"
        method="post"
        class="czh-search-form"
      >
        <div class="czh-form-group">
          <label for="czhBookName">书名</label>
          <input
            type="text"
            id="czhBookName"
            name="czhBookName"
            placeholder="支持模糊查询"
            th:value="${czhBookName}"
          />
        </div>

        <div class="czh-form-group">
          <label for="czhAuthor">作者</label>
          <input
            type="text"
            id="czhAuthor"
            name="czhAuthor"
            placeholder="支持模糊查询"
            th:value="${czhAuthor}"
          />
        </div>

        <div class="czh-form-group">
          <label for="czhIsbn">ISBN</label>
          <input
            type="text"
            id="czhIsbn"
            name="czhIsbn"
            placeholder="精确查询"
            th:value="${czhIsbn}"
          />
        </div>

        <div class="czh-form-group">
          <label for="czhCategory">分类</label>
          <input
            type="text"
            id="czhCategory"
            name="czhCategory"
            placeholder="精确查询"
            th:value="${czhCategory}"
          />
        </div>

        <button type="submit" class="czh-btn">高级搜索</button>
      </form>

      <div th:if="${czhBookList != null}">
        <div
          class="czh-table-container"
          th:if="${!#lists.isEmpty(czhBookList)}"
        >
          <table class="czh-results-table">
            <thead>
              <tr>
                <th>书名</th>
                <th>作者</th>
                <th>ISBN</th>
                <th>出版社</th>
                <th>出版日期</th>
                <th>价格</th>
                <th>分类</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="czhBook : ${czhBookList}">
                <td
                  th:text="${czhBook.czhBookName}"
                  style="font-weight: 600"
                ></td>
                <td th:text="${czhBook.czhAuthor}"></td>
                <td
                  th:text="${czhBook.czhIsbn}"
                  style="font-family: monospace"
                ></td>
                <td th:text="${czhBook.czhPublisher}"></td>
                <td th:text="${czhBook.czhPublishDate}"></td>
                <td
                  th:text="'¥' + ${czhBook.czhPrice}"
                  style="color: #e17055; font-weight: 600"
                ></td>
                <td>
                  <span
                    th:text="${czhBook.czhCategory}"
                    style="
                      background: #e8f0fe;
                      color: #1a73e8;
                      padding: 4px 10px;
                      border-radius: 12px;
                      font-size: 12px;
                    "
                  ></span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div th:if="${#lists.isEmpty(czhBookList)}" class="czh-no-results">
          <h3>📚 未找到相关图书</h3>
          <p>请尝试使用其他条件进行搜索</p>
        </div>
      </div>

      <a th:href="@{/user/home}" class="czh-btn czh-btn-back">返回首页</a>
    </div>
  </body>
</html>
