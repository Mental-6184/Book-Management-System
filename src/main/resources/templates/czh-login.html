<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>用户登录 - 图书管理系统</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff" fill-opacity="0.1" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,133.3C960,128,1056,96,1152,90.7C1248,85,1344,107,1392,117.3L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>')
          no-repeat bottom;
        background-size: cover;
        opacity: 0.3;
      }

      .container {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        padding: 50px 40px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        width: 450px;
        position: relative;
        z-index: 1;
        animation: slideIn 0.6s ease-out;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h2 {
        text-align: center;
        color: #333;
        margin-bottom: 35px;
        font-size: 28px;
        font-weight: 600;
        background: linear-gradient(135deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .form-group {
        margin-bottom: 25px;
        position: relative;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #555;
        font-weight: 600;
        font-size: 14px;
        transition: color 0.3s;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 15px 20px;
        border: 2px solid #e1e8ed;
        border-radius: 12px;
        font-size: 15px;
        transition: all 0.3s ease;
        background: #f8fafc;
      }

      input[type="text"]:focus,
      input[type="password"]:focus {
        outline: none;
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        transform: translateY(-2px);
      }

      .btn {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        margin-top: 10px;
      }

      .btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
        transition: left 0.5s;
      }

      .btn:hover::before {
        left: 100%;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
      }

      .btn:active {
        transform: translateY(0);
      }

      .link {
        text-align: center;
        margin-top: 25px;
        font-size: 14px;
      }

      .link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s ease;
        position: relative;
      }

      .link a::after {
        content: "";
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 2px;
        background: #667eea;
        transition: width 0.3s ease;
      }

      .link a:hover::after {
        width: 100%;
      }

      .error {
        background: linear-gradient(135deg, #ff6b6b, #ee5a24);
        color: white;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 25px;
        text-align: center;
        font-weight: 500;
        animation: shake 0.5s ease-in-out;
        box-shadow: 0 5px 15px rgba(238, 90, 36, 0.3);
      }

      .success {
        background: linear-gradient(135deg, #51cf66, #37b24d);
        color: white;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 25px;
        text-align: center;
        font-weight: 500;
        animation: slideIn 0.5s ease-out;
        box-shadow: 0 5px 15px rgba(55, 178, 77, 0.3);
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-10px);
        }
        75% {
          transform: translateX(10px);
        }
      }

      .radio-group {
        display: flex;
        gap: 20px;
        margin-top: 10px;
        padding: 15px;
        background: #f8fafc;
        border-radius: 12px;
        border: 2px solid #e1e8ed;
      }

      .radio-option {
        display: flex;
        align-items: center;
        cursor: pointer;
        padding: 8px 15px;
        border-radius: 8px;
        transition: all 0.3s ease;
        flex: 1;
        justify-content: center;
      }

      .radio-option:hover {
        background: rgba(102, 126, 234, 0.1);
      }

      .radio-option input[type="radio"] {
        margin-right: 8px;
        accent-color: #667eea;
      }

      .test-info {
        background: linear-gradient(135deg, #f8fafc, #e1e8ed);
        padding: 20px;
        border-radius: 12px;
        margin-top: 20px;
        border: 2px solid #e1e8ed;
      }

      .test-info p {
        color: #64748b;
        font-size: 13px;
        line-height: 1.6;
        margin-bottom: 8px;
      }

      .test-info strong {
        color: #334155;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>图书管理系统 - 登录</h2>

      <div th:if="${czhError}" class="error" th:text="${czhError}"></div>
      <div th:if="${czhSuccess}" class="success" th:text="${czhSuccess}"></div>

      <form th:action="@{/user/login}" method="post">
        <div class="form-group">
          <label for="czhUserName">用户名</label>
          <input
            type="text"
            id="czhUserName"
            name="czhUserName"
            placeholder="请输入用户名"
            required
          />
        </div>

        <div class="form-group">
          <label for="czhPassword">密码</label>
          <input
            type="password"
            id="czhPassword"
            name="czhPassword"
            placeholder="请输入密码"
            required
          />
        </div>

        <div class="form-group">
          <label>登录身份</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="czhRole" value="czh_user" checked />
              <span>普通用户</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="czhRole" value="czh_admin" />
              <span>管理员</span>
            </label>
          </div>
        </div>

        <button type="submit" class="btn">立即登录</button>
      </form>

      <div class="link">
        <p>还没有账号？ <a th:href="@{/user/register}">立即注册</a></p>
      </div>

      <div class="test-info">
        <p><strong>测试账号信息：</strong></p>
        <p><strong>管理员：</strong> admin / admin123</p>
        <p><strong>普通用户：</strong> user / user123</p>
      </div>
    </div>
  </body>
</html>
