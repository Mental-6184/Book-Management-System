<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>添加图书 - 图书管理系统</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
        padding: 40px 20px;
      }

      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff" fill-opacity="0.1" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,133.3C960,128,1056,96,1152,90.7C1248,85,1344,107,1392,117.3L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>')
          no-repeat bottom;
        background-size: cover;
        opacity: 0.3;
        z-index: 0;
      }

      .czh-container {
        max-width: 900px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        padding: 50px;
        border-radius: 24px;
        box-shadow: 0 25px 80px rgba(0, 0, 0, 0.15);
        position: relative;
        z-index: 1;
        animation: slideIn 0.8s ease-out;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h2 {
        text-align: center;
        color: #333;
        margin-bottom: 40px;
        font-size: 32px;
        font-weight: 700;
        background: linear-gradient(135deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        position: relative;
      }

      h2::after {
        content: "";
        position: absolute;
        bottom: -10px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 4px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        border-radius: 2px;
      }

      .czh-form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
      }

      .czh-form-group {
        margin-bottom: 5px;
        position: relative;
      }

      .czh-form-group.full-width {
        grid-column: span 2;
      }

      label {
        display: block;
        margin-bottom: 10px;
        color: #374151;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.025em;
      }

      label::after {
        content: "";
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 20px;
        height: 2px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        border-radius: 1px;
      }

      input[type="text"],
      input[type="date"],
      input[type="number"],
      textarea,
      input[type="file"] {
        width: 100%;
        padding: 16px 20px;
        border: 2px solid #e5e7eb;
        border-radius: 16px;
        font-size: 15px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        background: #f9fafb;
        color: #1f2937;
        font-family: inherit;
      }

      input[type="text"]:focus,
      input[type="date"]:focus,
      input[type="number"]:focus,
      textarea:focus {
        outline: none;
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1),
          0 4px 12px rgba(0, 0, 0, 0.1);
        transform: translateY(-2px);
      }

      textarea {
        resize: vertical;
        min-height: 140px;
        line-height: 1.5;
      }

      input[type="file"] {
        padding: 12px 16px;
        cursor: pointer;
      }

      input[type="file"]::-webkit-file-upload-button {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 8px;
        margin-right: 10px;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.3s ease;
      }

      input[type="file"]::-webkit-file-upload-button:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
      }

      .czh-btn-group {
        display: flex;
        gap: 20px;
        margin-top: 40px;
        justify-content: center;
      }

      .czh-btn {
        padding: 16px 40px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 16px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        letter-spacing: 0.025em;
      }

      .czh-btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
        transition: left 0.6s ease;
      }

      .czh-btn:hover::before {
        left: 100%;
      }

      .czh-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
      }

      .czh-btn:active {
        transform: translateY(-1px);
      }

      .czh-btn-secondary {
        background: linear-gradient(135deg, #94a3b8, #64748b);
      }

      .czh-btn-secondary:hover {
        box-shadow: 0 15px 35px rgba(148, 163, 184, 0.3);
      }

      .czh-error {
        background: linear-gradient(135deg, #ff6b6b, #ee5a24);
        color: white;
        padding: 18px 24px;
        border-radius: 16px;
        margin-bottom: 30px;
        text-align: center;
        font-weight: 500;
        box-shadow: 0 8px 25px rgba(238, 90, 36, 0.25);
        animation: shake 0.6s ease-in-out;
        border-left: 4px solid rgba(255, 255, 255, 0.3);
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-12px);
        }
        75% {
          transform: translateX(12px);
        }
      }

      .czh-input-icon {
        position: absolute;
        right: 15px;
        top: 42px;
        color: #9ca3af;
        font-size: 18px;
        pointer-events: none;
        transition: color 0.3s ease;
      }

      input:focus + .czh-input-icon {
        color: #667eea;
      }

      .czh-form-hint {
        font-size: 12px;
        color: #6b7280;
        margin-top: 6px;
        line-height: 1.4;
      }

      .czh-section-title {
        font-size: 18px;
        font-weight: 600;
        color: #374151;
        margin: 30px 0 20px 0;
        padding-bottom: 10px;
        border-bottom: 2px solid #f3f4f6;
        position: relative;
      }

      .czh-section-title::after {
        content: "";
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 40px;
        height: 2px;
        background: linear-gradient(135deg, #667eea, #764ba2);
      }

      @media (max-width: 768px) {
        .czh-container {
          padding: 30px 20px;
          margin: 20px;
        }

        .czh-form-grid {
          grid-template-columns: 1fr;
          gap: 20px;
        }

        .czh-form-group.full-width {
          grid-column: span 1;
        }

        h2 {
          font-size: 24px;
        }

        .czh-btn-group {
          flex-direction: column;
        }

        .czh-btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="czh-container">
      <h2>添加新图书</h2>

      <div th:if="${czhError}" class="czh-error" th:text="${czhError}"></div>

      <form
        th:action="@{/admin/book/add}"
        method="post"
        enctype="multipart/form-data"
      >
        <div class="czh-form-grid">
          <div class="czh-form-group">
            <label for="czhBookName">书名</label>
            <input
              type="text"
              id="czhBookName"
              name="czhBookName"
              required
              placeholder="输入图书名称"
            />
          </div>

          <div class="czh-form-group">
            <label for="czhAuthor">作者</label>
            <input
              type="text"
              id="czhAuthor"
              name="czhAuthor"
              required
              placeholder="输入作者姓名"
            />
          </div>

          <div class="czh-form-group">
            <label for="czhIsbn">ISBN</label>
            <input
              type="text"
              id="czhIsbn"
              name="czhIsbn"
              required
              placeholder="输入13位ISBN码"
            />
          </div>

          <div class="czh-form-group">
            <label for="czhPublisher">出版社</label>
            <input
              type="text"
              id="czhPublisher"
              name="czhPublisher"
              placeholder="输入出版社名称"
            />
          </div>

          <div class="czh-form-group">
            <label for="czhPublishDate">出版日期</label>
            <input type="date" id="czhPublishDate" name="czhPublishDate" />
          </div>

          <div class="czh-form-group">
            <label for="czhPrice">价格 (¥)</label>
            <input
              type="number"
              id="czhPrice"
              name="czhPrice"
              step="0.01"
              min="0"
              required
              placeholder="0.00"
            />
          </div>

          <div class="czh-form-group full-width">
            <label for="czhCategory">图书分类</label>
            <input
              type="text"
              id="czhCategory"
              name="czhCategory"
              placeholder="例如：小说、技术、历史"
            />
          </div>

          <div class="czh-form-group full-width">
            <label for="czhDescription">内容描述</label>
            <textarea
              id="czhDescription"
              name="czhDescription"
              placeholder="简要描述图书内容..."
            ></textarea>
          </div>

          <div class="czh-form-group full-width">
            <label for="czhCoverImage">封面图片</label>
            <input
              type="file"
              id="czhCoverImage"
              name="czhCoverImage"
              accept="image/*"
              style="padding: 8px"
            />
          </div>
        </div>

        <div class="czh-btn-group">
          <button type="submit" class="czh-btn">确认添加</button>
          <a th:href="@{/admin/home}" class="czh-btn czh-btn-secondary"
            >取消并返回</a
          >
        </div>
      </form>
    </div>
  </body>
</html>
